<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Diary</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .login-wrap {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            gap: 0;
        }

        /* 로고: 처음엔 크고 중앙, 1초 후 작아지며 위로 */
        .logo-big {
            font-size: 52px;
            font-weight: 300;
            color: var(--sky);
            letter-spacing: -1px;
            transition: font-size 0.6s ease, margin-bottom 0.6s ease;
            margin-bottom: 0;
        }
        .logo-big.shrink {
            font-size: 28px;
            margin-bottom: 32px;
        }

        /* 로그인 카드: 처음엔 숨김 */
        .login-card {
            width: 360px;
            opacity: 0;
            transform: translateY(10px);
            transition: opacity 0.5s ease, transform 0.5s ease;
            pointer-events: none;
        }
        .login-card.show {
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
        }

        .login-card .input-group { margin-bottom: 20px; }

        .login-card .btn-primary {
            width: 100%;
            padding: 12px;
            font-size: 15px;
            margin-top: 8px;
        }

        .divider {
            text-align: center;
            margin: 16px 0;
            color: var(--gray-400);
            font-size: 13px;
        }

        .btn-join {
            width: 100%;
            background: var(--pink-light);
            color: var(--pink);
            border: 1.5px solid var(--pink);
            border-radius: 8px;
            padding: 10px;
            font-family: inherit;
            font-size: 14px;
            cursor: pointer;
            transition: background 0.15s;
        }
        .btn-join:hover { background: var(--pink); color: white; }

        /* 회원가입 패널 */
        .join-panel {
            display: none;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid var(--gray-200);
        }
        .join-panel.open { display: block; }
        .join-panel .input-group { margin-bottom: 16px; }
        .join-panel label {
            font-size: 12px;
            color: var(--gray-400);
            display: block;
            margin-bottom: 4px;
        }
    </style>
</head>
<body>
<div class="login-wrap">
    <!-- 로고: 처음엔 화면 중앙에 크게 -->
    <div class="logo-big" id="logo">My Diary</div>

    <!-- 로그인 카드: 1초 후 나타남 -->
    <div class="card login-card" id="loginCard">

        <!-- 로그인 폼 -->
        <div id="loginForm">
            <div class="input-group">
                <input class="input" type="text" id="loginId" placeholder="아이디">
            </div>
            <div class="input-group">
                <input class="input" type="password" id="password" placeholder="비밀번호">
            </div>
            <p class="error-msg" id="loginError"></p>
            <button class="btn btn-primary" id="loginBtn">로그인</button>
            <div class="divider">또는</div>
            <button class="btn-join" id="toggleJoin">회원가입 하기</button>
        </div>

        <!-- 회원가입 패널 (토글) -->
        <div class="join-panel" id="joinPanel">
            <div class="input-group">
                <label>아이디</label>
                <input class="input" type="text" id="joinId" placeholder="영문, 숫자 조합">
            </div>
            <div class="input-group">
                <label>비밀번호 (4자리 이상)</label>
                <input class="input" type="password" id="joinPw" placeholder="4자리 이상">
            </div>
            <div class="input-group">
                <label>닉네임</label>
                <input class="input" type="text" id="joinNickname" placeholder="표시될 이름">
            </div>
            <p class="error-msg" id="joinError"></p>
            <button class="btn btn-pink" id="joinBtn" style="width:100%; padding:10px;">
                가입하기
            </button>
        </div>
    </div>
</div>

<script src="/js/api.js"></script>
<script src="/js/index.js"></script>
</body>
</html>
