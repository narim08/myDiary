<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Diary</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .back-btn {
            background: none;
            border: none;
            font-size: 20px;
            cursor: pointer;
            color: var(--gray-600);
            padding: 4px 8px;
        }

        .date-title {
            font-size: 16px;
            font-weight: 500;
            color: var(--text);
        }

        /* 목록 */
        .diary-list { margin-top: 20px; }

        .diary-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 18px 20px;
            background: var(--white);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            margin-bottom: 10px;
            cursor: pointer;
            transition: transform 0.1s, box-shadow 0.1s;
        }
        .diary-item:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 16px rgba(0,0,0,0.1);
        }

        .diary-item .item-title {
            font-size: 15px;
            color: var(--text);
        }
        .diary-item .item-time {
            font-size: 12px;
            color: var(--gray-400);
            white-space: nowrap;
            margin-left: 12px;
        }

        /* 빈 상태 */
        .empty-state {
            text-align: center;
            padding: 60px 0;
            color: var(--gray-400);
            font-size: 15px;
        }
        .empty-state .emoji { font-size: 40px; margin-bottom: 12px; }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
    </style>
</head>
<body>

<header class="header">
    <button class="back-btn" onclick="location.href='/main.html'">‹</button>
    <div class="logo">My Diary</div>
    <div style="width:40px"></div>
</header>

<div class="page">
    <div class="top-bar">
        <div class="date-title" id="dateTitle"></div>
        <button class="btn btn-pink" id="writeBtn">✏️ 글쓰기</button>
    </div>

    <div class="diary-list" id="diaryList"></div>
</div>

<script src="/js/api.js"></script>
<script src="/js/diary.js"></script>
</body>
</html>
